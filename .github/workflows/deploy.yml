name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production Folder
        run: |
          cd /opt/apps/prod/kheera-backend/Kheera-Backend

          git pull origin main

          chmod +x mvnw

          ./mvnw clean package -DskipTests

          docker compose down

          docker compose up -d --build
