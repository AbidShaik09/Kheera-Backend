name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build Spring Boot App
        run: ./mvnw clean package -DskipTests

      - name: Deploy Containers
        run: |
          docker compose down
          docker compose up -d --build
