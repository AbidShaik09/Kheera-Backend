spring.application.name=kheera-backend

jwt.secret=${JWT_SECRET}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.url=${DB_SERVER}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
server.port=${PORT}

springdoc.swagger-ui.path=/swagger-ui.html
server.forward-headers-strategy=framework
X-Forwarded-Proto=https

#Email related properties

spring.mail.host=smtp.gmail.com ${EMAIL_HOST}
spring.mail.port=587 ${EMAIL_PORT}
spring.mail.username=yourmail@gmail.com ${EMAIL_USERNAME}
spring.mail.password=your-app-password ${EMAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true